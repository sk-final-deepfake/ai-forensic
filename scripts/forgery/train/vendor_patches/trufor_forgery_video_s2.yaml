# S2 line — R5 recipe clone (isolated S-line namespace)
# Copy to: vendor/TruFor/TruFor_train_test/lib/config/trufor_forgery_video_s2.yaml
# Use: -exp trufor_forgery_video_s2
#
# Same as R5: BEST_KEY=tampered_pixel_recall, CLASS_WEIGHTS [1.0,1.5], LR 0.001, END_EPOCH 8
# Prepare (run script): skip-OOW + oversample x3
# Start: models/test baseline (NOT R5 checkpoint)

CUDNN:
  BENCHMARK: false
  DETERMINISTIC: false
  ENABLED: false
WORKERS: 4

DATASET:
  TRAIN: [FSVIDEO]
  VALID: [FSVIDEO]
  NUM_CLASSES: 2
  CLASS_WEIGHTS: [1.0, 1.5]

MODEL:
  NAME: detconfcmx
  PRETRAINED: 'pretrained_models/segformers/mit_b2.pth'
  MODS: ('RGB','NP++')
  EXTRA:
    BACKBONE: mit_b2
    DECODER: MLPDecoder
    DECODER_EMBED_DIM: 512
    PREPRC: 'imagenet'
    BN_EPS: 0.001
    BN_MOMENTUM: 0.1
    NP_WEIGHTS: 'pretrained_models/noiseprint++/noiseprint++.th'
    MODULES: ['NP++','backbone','loc_head']
    FIX_MODULES: ['NP++']

LOSS:
  LOSSES:
    - [ 'LOC', 1.0, 'dice_entropy' ]
  SMOOTH: 0

TRAIN:
  PRETRAINING: ''
  RESUME: false
  IMAGE_SIZE: [512, 512]
  BATCH_SIZE_PER_GPU: 2
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 8
  OPTIMIZER: sgd
  LR: 0.001
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: false
  IGNORE_LABEL: -1
  AUG: null
  NUM_SAMPLES: 0

VALID:
  FIRST_VALID: false
  MAX_SIZE: 1024
  BEST_KEY: 'tampered_pixel_recall'
  AUG: null
