# DEPRECATED — use trufor_forgery_video_r1.yaml (Baseline-line R1). Legacy naming only.
# ForenShield TruFor video forgery recipe v5 — baseline line, cause #1 only
# Copy to: vendor/TruFor/TruFor_train_test/lib/config/trufor_forgery_video_v5.yaml
# Use: -exp trufor_forgery_video_v5
#
# Same HP as recipe v2 smoke; ONLY change vs v2 yaml: VALID.BEST_KEY.
# Pair with v2 prepare cache (middle window): trufor-gmflow-train-400-v2
# Compare infer @0.5 to: (1) baseline weights (2) v2 smoke (avg_p-F1 best).

CUDNN:
  BENCHMARK: false
  DETERMINISTIC: false
  ENABLED: false
WORKERS: 4

DATASET:
  TRAIN: [FSVIDEO]
  VALID: [FSVIDEO]
  NUM_CLASSES: 2
  CLASS_WEIGHTS: [1.0, 1.5]

MODEL:
  NAME: detconfcmx
  PRETRAINED: 'pretrained_models/segformers/mit_b2.pth'
  MODS: ('RGB','NP++')
  EXTRA:
    BACKBONE: mit_b2
    DECODER: MLPDecoder
    DECODER_EMBED_DIM: 512
    PREPRC: 'imagenet'
    BN_EPS: 0.001
    BN_MOMENTUM: 0.1
    NP_WEIGHTS: 'pretrained_models/noiseprint++/noiseprint++.th'
    MODULES: ['NP++','backbone','loc_head']
    FIX_MODULES: ['NP++']

LOSS:
  LOSSES:
    - [ 'LOC', 1.0, 'dice_entropy' ]
  SMOOTH: 0

TRAIN:
  PRETRAINING: ''
  RESUME: false
  IMAGE_SIZE: [512, 512]
  BATCH_SIZE_PER_GPU: 2
  SHUFFLE: true
  BEGIN_EPOCH: 0
  END_EPOCH: 3
  OPTIMIZER: sgd
  LR: 0.001
  WD: 0.0005
  MOMENTUM: 0.9
  NESTEROV: false
  IGNORE_LABEL: -1
  AUG: null
  NUM_SAMPLES: 0

VALID:
  FIRST_VALID: false
  MAX_SIZE: 1024
  BEST_KEY: 'tampered_pixel_recall'
  AUG: null
